# Render Blueprint — hybrid lite API (512Mi, no torch).
# Emotion demo runs on Hugging Face Spaces — see backend/emotion_space/README.md

services:
  - type: web
    name: aditya-ai-studio-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.lite
    dockerContext: ./backend
    plan: starter
    region: oregon
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: BACKEND_MODE
        value: lite
      - key: LOG_LEVEL
        value: INFO
      - key: FRONTEND_ORIGIN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
